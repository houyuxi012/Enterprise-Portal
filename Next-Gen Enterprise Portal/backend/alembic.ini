[alembic]
script_location = db_migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://user:ChangeThis_Postgres_2026!@db:5432/portal_db?sslmode=verify-ca&sslrootcert=/run/certs/hyx_ngep.cer

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
