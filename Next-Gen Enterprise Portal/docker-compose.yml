services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_DB: ${POSTGRES_DB:-portal_db}
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        export POSTGRES_PASSWORD="$(cat /run/secrets/postgres_password)"
        mkdir -p /tmp/postgres-certs
        cp /run/certs/hyx_ngep.cer /tmp/postgres-certs/server.crt
        cp /run/certs/hyx_ngep.key /tmp/postgres-certs/server.key
        chown postgres:postgres /tmp/postgres-certs/server.crt /tmp/postgres-certs/server.key
        chmod 600 /tmp/postgres-certs/server.key
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/tmp/postgres-certs/server.crt \
          -c ssl_key_file=/tmp/postgres-certs/server.key \
          -c hba_file=/etc/postgresql/pg_hba.conf \
          -c password_encryption=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/nginx/certs:/run/certs:ro
      - ./ops/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    secrets:
      - postgres_password

  redis:
    image: redis:8.4-alpine
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        REDIS_PASSWORD="$(cat /run/secrets/redis_password)"
        exec docker-entrypoint.sh redis-server \
          --port 0 \
          --tls-port 6379 \
          --tls-cert-file /run/certs/hyx_ngep.cer \
          --tls-key-file /run/certs/hyx_ngep.key \
          --tls-ca-cert-file /run/certs/hyx_ngep.cer \
          --tls-auth-clients no \
          --requirepass "$$REDIS_PASSWORD"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./ops/nginx/certs:/run/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDIS_PASSWORD=\"$$(cat /run/secrets/redis_password)\" && redis-cli --tls --cacert /run/certs/hyx_ngep.cer -h 127.0.0.1 -p 6379 -a \"$$REDIS_PASSWORD\" ping | grep -q PONG",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    secrets:
      - redis_password

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: hyx-ngep-minio-1
    expose:
      - "9000"
      - "9001"
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        export MINIO_ROOT_USER="$(cat /run/secrets/minio_root_user)"
        export MINIO_ROOT_PASSWORD="$(cat /run/secrets/minio_root_password)"
        exec minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    secrets:
      - minio_root_user
      - minio_root_password

  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    environment:
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-next-gen-enterprise-portal}
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        MINIO_ROOT_USER="$(cat /run/secrets/minio_root_user)"
        MINIO_ROOT_PASSWORD="$(cat /run/secrets/minio_root_password)"
        echo "wait minio..."
        ok=0
        for i in $(seq 1 60); do
          if /usr/bin/mc alias set myminio http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; then
            ok=1
            break
          fi
          sleep 2
        done
        if [ "$$ok" -ne 1 ]; then
          echo "minio not ready after 120s"
          exit 1
        fi
        /usr/bin/mc mb -p "myminio/$$MINIO_BUCKET_NAME" || true
        echo "done"
    restart: "no"
    secrets:
      - minio_root_user
      - minio_root_password

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL_FILE: /run/secrets/backend_database_url
      REDIS_URL_FILE: /run/secrets/backend_redis_url
      PYTHONDONTWRITEBYTECODE: "1"
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "10"
      DB_MAX_CONNECTION_BUDGET: "80"
      SECRET_KEY_FILE: /run/secrets/jwt_secret
      MASTER_KEY_FILE: /run/secrets/master_key
      MASTER_KEY_PREVIOUS_FILE: /run/secrets/master_key_previous
      ACCESS_TOKEN_EXPIRE_MINUTES: "5"
      WEB_CONCURRENCY: "4"
      DB_AUTO_MIGRATE_ON_STARTUP: "false"
      CACHE_STRICT_MODE: "true"
      GUNICORN_TIMEOUT: "120"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STORAGE_TYPE: minio
      PUBLIC_BASE_URL: "https://127.0.0.1"
      CORS_ORIGINS: "https://127.0.0.1"
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "True"
      COOKIE_SAMESITE: "lax"
      MINIO_ENDPOINT_FILE: /run/secrets/minio_endpoint
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio_access_key
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_secret_key
      MINIO_BUCKET_NAME_FILE: /run/secrets/minio_bucket_name
      MINIO_SECURE_FILE: /run/secrets/minio_secure
      LOKI_PUSH_URL: http://loki:3100
      LOKI_BASE_URL: http://loki:3100
      LOKI_TENANT_ID: enterprise-portal
      LICENSE_ED25519_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        MCowBQYDK2VwAyEADko/AM8cwzU86O44/rXDqn8ukJpxJGgPEKJskfw7Iwk=
        -----END PUBLIC KEY-----
      LICENSE_ED25519_PUBLIC_KEY_FINGERPRINT: "57e66ed76ba225868318c89943a34f92edfb7d542303fa1b0d66c9dc6b644046"
      BIND_PASSWORD_ENC_KEYS_FILE: /run/secrets/bind_password_enc_keys
      BIND_PASSWORD_ENC_ACTIVE_KID_FILE: /run/secrets/bind_password_enc_active_kid
      PLATFORM_AUTO_RELOAD: "true"
      INITIAL_ADMIN_PASSWORD_FILE: /run/secrets/initial_admin_password
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Administrator}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@local.invalid}
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./backend:/app
      - /app/test_db
      - ./backend/uploads:/app/uploads
      - ./ops/nginx:/app/ops/nginx:ro
      - ./ops/loki:/app/loki:ro
      - ./ops/nginx/certs:/run/certs:ro
    secrets:
      - backend_database_url
      - backend_redis_url
      - jwt_secret
      - master_key
      - master_key_previous
      - bind_password_enc_keys
      - bind_password_enc_active_kid
      - minio_access_key
      - minio_secret_key
      - minio_endpoint
      - minio_bucket_name
      - minio_secure
      - initial_admin_password

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      VITE_API_BASE_URL: /api/v1
      PLATFORM_RELOAD_WATCH_INTERVAL_SECONDS: "2"
    depends_on:
      - backend
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro

  loki:
    image: grafana/loki:2.9.4
    command: -config.file=/etc/loki/loki-config.yaml
    expose:
      - "3100"
    volumes:
      - ./ops/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3100/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: redis-datasource
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_DB: ${POSTGRES_DB:-portal_db}
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        export GF_SECURITY_ADMIN_PASSWORD="$(cat /run/secrets/grafana_admin_password)"
        export REDIS_PASSWORD="$(cat /run/secrets/redis_password)"
        export POSTGRES_PASSWORD="$(cat /run/secrets/postgres_password)"
        exec /run.sh
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - redis
      - db
    secrets:
      - grafana_admin_password
      - redis_password
      - postgres_password

volumes:
  postgres_data:
  redis_data:
  minio_data:
  loki_data:
  grafana_data:

secrets:
  postgres_password:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/postgres_password
  redis_password:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/redis_password
  jwt_secret:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/jwt_secret
  master_key:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/master_key
  master_key_previous:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/master_key_previous
  bind_password_enc_keys:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/bind_password_enc_keys
  bind_password_enc_active_kid:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/bind_password_enc_active_kid
  minio_root_user:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_root_user
  minio_root_password:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_root_password
  minio_access_key:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_access_key
  minio_secret_key:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_secret_key
  minio_endpoint:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_endpoint
  minio_bucket_name:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_bucket_name
  minio_secure:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/minio_secure
  backend_database_url:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/backend_database_url
  backend_redis_url:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/backend_redis_url
  grafana_admin_password:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/grafana_admin_password
  initial_admin_password:
    file: ${PORTAL_RUNTIME_SECRETS_DIR:-/run/secrets}/initial_admin_password
