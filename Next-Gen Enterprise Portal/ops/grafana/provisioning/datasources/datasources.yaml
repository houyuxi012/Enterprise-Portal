# Grafana Data Sources Provisioning
# Auto-configures data sources on Grafana startup

apiVersion: 1

datasources:
  # Loki - 日志数据源
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: enterprise-portal

  # Redis - 缓存数据源 (需要安装 redis-datasource 插件)
  - name: Redis
    type: redis-datasource
    uid: redis
    access: proxy
    url: rediss://redis:6379
    editable: false
    jsonData:
      client: standalone
      poolSize: 5
      timeout: 10
      pingInterval: 0
      pipelineWindow: 0
      tlsAuth: false
      tlsSkipVerify: true
    secureJsonData:
      password: ${REDIS_PASSWORD}

  # PostgreSQL - 数据库数据源 (Grafana 内置支持)
  - name: PostgreSQL
    type: postgres
    uid: postgres
    access: proxy
    url: db:5432
    user: ${POSTGRES_USER}
    editable: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: require
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1700
      timescaledb: false
