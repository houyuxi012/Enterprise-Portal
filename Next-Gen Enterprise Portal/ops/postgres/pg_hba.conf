# Enforce TLS for all TCP clients.
# Local Unix socket connections are kept for container-local admin tasks.

local   all             all                                     trust

# Reject all non-TLS TCP connections
hostnossl all           all             0.0.0.0/0               reject
hostnossl all           all             ::/0                    reject

# Allow TLS connections with SCRAM password auth
hostssl all             all             0.0.0.0/0               scram-sha-256
hostssl all             all             ::/0                    scram-sha-256
